<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMA HARMONY // Ultimate Tactical Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505;
            --cyan: #00f3ff;
            --magenta: #bf00ff;
            --orange: #ffaa00;
            --panel: rgba(10, 15, 20, 0.95);
        }
        body { background-color: var(--bg-base); color: #e0e0e0; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .cyber-panel {
            background: var(--panel); backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
        }
        .neon-border-b { border-bottom: 2px solid var(--cyan); }
        .text-glow { text-shadow: 0 0 8px rgba(0, 243, 255, 0.6); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 3px; }
        
        .dropdown-scroll::-webkit-scrollbar { width: 4px; }
        .dropdown-scroll::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }
        
        input[type="checkbox"], input[type="radio"] { accent-color: var(--cyan); cursor: pointer; }
        input[type="number"], input[type="text"] { background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan); outline: none; padding: 6px 10px; width: 100%; font-family: 'JetBrains Mono'; font-size: 13px; }
        input[type="text"]:focus { box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        
        #tactical-canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
    </style>
</head>
<body class="h-screen w-screen flex relative overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="cyber-panel w-[360px] h-full flex-shrink-0 flex flex-col z-40 absolute md:relative transform -translate-x-full md:translate-x-0 transition-transform duration-300 border-r border-[#00f3ff]/20 overflow-y-auto">
        <header class="p-5 neon-border-b bg-black/60 sticky top-0 z-30 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-[#00f3ff] text-glow tracking-widest">GAMA HARMONY</h1>
                <p class="text-[10px] font-mono text-gray-400 mt-1">A* PATHFINDING ENGINE v11.0</p>
            </div>
            <button id="close-sidebar-btn" class="md:hidden text-gray-400 hover:text-white pt-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </header>

        <div class="p-5 space-y-5 flex-1 pb-10">
            <section>
                <div id="status-indicator" class="w-full py-2 bg-transparent border border-yellow-500 text-yellow-500 font-mono text-sm flex items-center justify-center gap-2 animate-pulse">
                    ⚡ Conectando à Rede Global...
                </div>
            </section>

            <div id="controls-module" class="opacity-50 pointer-events-none transition-opacity space-y-5">
                
                <section class="bg-black/40 p-3 rounded border border-gray-800">
                    <h2 class="text-xs font-mono text-[#00f3ff] mb-2 uppercase">> Modo Tático</h2>
                    <div class="flex flex-col gap-2 text-sm md:text-xs">
                        <label class="flex items-center gap-2"><input type="radio" name="interaction-mode" value="ping" checked> 📡 Radar Ping</label>
                        <label class="flex items-center gap-2"><input type="radio" name="interaction-mode" value="route-straight" class="accent-[#bf00ff]"> 📏 Rota Direta (Auto-Otimizada)</label>
                        <label class="flex items-center gap-2"><input type="radio" name="interaction-mode" value="route-smart" class="accent-[#ffaa00]"> 🛣️ Rota Inteligente (Auto-Otimizada)</label>
                    </div>
                </section>

                <!-- PAINEL DE ROTAS OTIMIZADAS -->
                <section class="bg-black/40 p-3 rounded border border-[#bf00ff]/50 shadow-[0_0_10px_rgba(191,0,255,0.1)] transition-colors flex flex-col" id="route-panel">
                    <h2 class="text-xs font-mono text-gray-200 mb-2 uppercase" id="route-panel-title">> Multi-Stop Routing</h2>
                    
                    <div id="route-list-ui" class="max-h-32 overflow-y-auto mb-2 space-y-1 dropdown-scroll pr-1"></div>

                    <div class="relative flex gap-1 mb-3">
                        <div class="relative flex-1">
                            <input type="text" id="route-add-input" placeholder="Add Ponto (Nome ou K16)" autocomplete="off">
                        </div>
                        <button id="btn-add-route" class="bg-[#00f3ff]/20 text-[#00f3ff] px-4 font-bold border border-[#00f3ff] hover:bg-[#00f3ff]/40 transition">+</button>
                    </div>

                    <div class="flex items-center justify-between mb-3 border-t border-gray-800 pt-3">
                        <span class="text-xs text-gray-400">Velocidade Média:</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="route-speed" value="30" class="w-14 text-center border-gray-500 text-white !py-1">
                            <span class="text-xs text-gray-400">km/h</span>
                        </div>
                    </div>
                    
                    <div id="route-output" class="text-center font-mono text-[11px] text-gray-300 bg-black/50 p-2 border border-gray-800 rounded">
                        Aguardando coordenadas...
                    </div>
                    
                    <button id="btn-clear-route" class="w-full mt-2 py-1 bg-transparent text-gray-400 text-xs font-mono border border-gray-700 hover:text-white hover:border-gray-500 transition hidden">LIMPAR ROTA</button>
                </section>

                <section class="bg-black/40 p-3 rounded border border-gray-800 shadow-[0_0_15px_rgba(0,243,255,0.05)]">
                    <h2 class="text-xs font-mono text-[#00f3ff] mb-2 uppercase">> Database Localizador</h2>
                    <div class="relative w-full mb-3">
                        <input type="text" id="search-input" placeholder="Pesquisar Local ou Grid (Ex: M20)..." autocomplete="off">
                    </div>
                    <button id="btn-focus" class="w-full py-2 bg-[#00f3ff]/10 text-[#00f3ff] text-sm font-mono border border-[#00f3ff] hover:bg-[#00f3ff]/30 transition uppercase tracking-widest font-bold">Focar no Mapa</button>
                </section>

                <section class="bg-black/40 p-3 rounded border border-gray-800">
                    <h2 class="text-xs font-mono text-[#00f3ff] mb-2 uppercase">> Camadas Táticas</h2>
                    <div class="grid grid-cols-2 gap-3 text-sm md:text-xs">
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-deeds-active" checked> <span class="text-[#00ff66]">Deed (Ativa)</span></label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-deeds-fallen" checked> <span class="text-[#ff003c]">Deed (Caída)</span></label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-highways" checked> Highways</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-bridges" checked> Bridges</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-tunnels" checked> Tunnels</label>
                        <label class="flex items-center gap-2"><input type="checkbox" id="l-specials"> Specials</label>
                        <label class="flex items-center gap-2 col-span-2"><input type="checkbox" id="l-grid" checked> Grid Alfanumérico (G)</label>
                    </div>
                </section>

                <section class="bg-black/40 p-3 rounded border border-gray-800">
                    <h2 class="text-xs font-mono text-[#00f3ff] mb-2 uppercase">> Alvo Atual (URL Shareable)</h2>
                    <input type="text" id="hud-selected" value="Aguardando..." readonly class="text-center font-bold tracking-widest text-[#00ff66] !border-gray-700">
                </section>
            </div>
        </div>
    </aside>

    <!-- AREA DO MAPA -->
    <main id="map-container" class="flex-1 relative bg-[#050505] overflow-hidden cursor-crosshair h-full w-full">
        <button id="mobile-menu-btn" class="md:hidden absolute top-4 left-4 z-20 bg-black/80 text-[#00f3ff] p-2 border border-[#00f3ff]/50 shadow-[0_0_10px_rgba(0,243,255,0.2)] backdrop-blur rounded">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>

        <div class="absolute top-4 right-4 z-10 bg-black/80 text-[#00f3ff] font-mono text-[10px] px-3 py-1 border border-[#00f3ff]/30 backdrop-blur rounded pointer-events-none">
            MOUSE: <span id="hud-mouse">X:0 Y:0</span> | ZM: <span id="hud-scale">1.0x</span>
        </div>
        
        <canvas id="tactical-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
    </main>

    <script>
        // --- 1. CORE UTILS & DATA STRUCTURES ---
        class SystemLog {
            constructor(id) { this.terminal = document.getElementById(id); }
            log(msg, type = 'info') {
                const colors = { error: 'text-red-500', warn: 'text-yellow-400', info: 'text-green-400', cyber: 'text-[#00f3ff]', route: 'text-[#ffaa00]' };
                const line = document.createElement('div');
                line.className = `mb-1 ${colors[type]}`;
                line.textContent = `[${new Date().toLocaleTimeString('pt-BR')}] ${msg}`;
            }
        }
        const logger = new SystemLog('terminal');

        function parseGridToCoords(gridStr) {
            const clean = gridStr.toUpperCase().replace(/\s/g, '');
            const match = clean.match(/^([A-Z]+)(\d+)$|^(\d+)([A-Z]+)$/);
            if (!match) return null;
            
            const letter = match[1] || match[4];
            const number = parseInt(match[2] || match[3], 10);
            
            let y = 0;
            for (let i = 0; i < letter.length; i++) y = y * 26 + (letter.charCodeAt(i) - 64);
            
            const pxX = (number - 7) * 200 + 100;
            const pxY = (y - 2) * 200 + 100;
            return { x: pxX, y: pxY, name: `GRID ${letter}${number}` };
        }

        class MinHeap {
            constructor() { this.heap = []; }
            push(val, prio) { this.heap.push({val, prio}); this.up(this.heap.length - 1); }
            pop() {
                if(this.heap.length === 0) return null;
                if(this.heap.length === 1) return this.heap.pop();
                const top = this.heap[0]; this.heap[0] = this.heap.pop(); this.down(0); return top;
            }
            up(i) {
                while(i > 0) {
                    let p = Math.floor((i-1)/2);
                    if(this.heap[i].prio >= this.heap[p].prio) break;
                    [this.heap[i], this.heap[p]] = [this.heap[p], this.heap[i]]; i = p;
                }
            }
            down(i) {
                while(i*2+1 < this.heap.length) {
                    let left = i*2+1, right = i*2+2, min = left;
                    if(right < this.heap.length && this.heap[right].prio < this.heap[left].prio) min = right;
                    if(this.heap[i].prio <= this.heap[min].prio) break;
                    [this.heap[i], this.heap[min]] = [this.heap[min], this.heap[i]]; i = min;
                }
            }
            isEmpty() { return this.heap.length === 0; }
        }

        // --- 2. DATA FETCHER & GRAPH BUILDER ---
        class DataLink {
            constructor() { this.data = { deeds: [], highways: [], bridges: [], tunnels: [], specials: [], graph: new Map(), nodes: [] }; }

            async fetchDynamicData() {
                let htmlRaw = null;
                try {
                    const proxies = ["https://api.codetabs.com/v1/proxy/?quest=https://harmony.yaga.host", "https://corsproxy.io/?https://harmony.yaga.host"];
                    for (let url of proxies) { try { const res = await fetch(url); if (res.ok) { htmlRaw = await res.text(); break; } } catch(e) {} }
                    if (!htmlRaw) throw new Error("Acesso bloqueado por WAF.");
                    const match = htmlRaw.match(/window\.sheetData\s*=\s*(\{[\s\S]+?\});/);
                    if (!match) throw new Error("Assinatura JSON ausente.");
                    await this.parseData(JSON.parse(match[1]));
                } catch (e) { throw new Error(e.message); }
            }

            parseData(rawJson) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        const getTab = name => rawJson.valueRanges.find(r => r.range.includes(name))?.values || [];
                        this.data.deeds = getTab("Deeds").map(row => ({ name: row[0], x: parseInt(row[1]), y: parseInt(row[2]), isHidden: row[3] === "HID" || row[3] === "RIG" })).filter(d => !isNaN(d.x));
                        this.data.specials = getTab("Special").map(row => ({ name: row[0], x: parseInt(row[1]), y: parseInt(row[2]) })).filter(s => !isNaN(s.x));
                        const parsePath = row => { try { return { name: row[0], path: JSON.parse(row[1]) }; } catch(e) { return null; } };
                        this.data.highways = getTab("Highways").map(parsePath).filter(v=>v);
                        const parseSegment = row => { if(row.length >= 5) return { name: row[0], path: [ [parseInt(row[1]), parseInt(row[2])], [parseInt(row[3]), parseInt(row[4])] ] }; return null; };
                        this.data.bridges = getTab("Bridges").map(parseSegment).filter(v=>v);
                        this.data.tunnels = getTab("Tunnels").map(parseSegment).filter(v=>v);
                        this.buildGraph(); resolve();
                    }, 50);
                });
            }

            buildGraph() {
                this.data.graph.clear(); this.data.nodes = []; let nodeId = 0;
                const spatialGrid = new Map(), cellSize = 50, maxConnectionDist = 15, interpolateStep = 10; 

                const createNode = (x, y) => {
                    const node = { id: nodeId++, x, y }; this.data.nodes.push(node); this.data.graph.set(node.id, []);
                    const gKey = `${Math.floor(x/cellSize)},${Math.floor(y/cellSize)}`;
                    if(!spatialGrid.has(gKey)) spatialGrid.set(gKey, []); spatialGrid.get(gKey).push(node);
                    return node;
                };

                const addEdge = (n1, n2) => {
                    if (n1.id === n2.id) return;
                    const dist = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                    const edges1 = this.data.graph.get(n1.id); if (!edges1.find(e => e.target === n2.id)) edges1.push({ target: n2.id, weight: dist });
                    const edges2 = this.data.graph.get(n2.id); if (!edges2.find(e => e.target === n1.id)) edges2.push({ target: n1.id, weight: dist });
                };

                const processPaths = (paths) => {
                    paths.forEach(r => {
                        let prevNode = null;
                        for (let i = 0; i < r.path.length - 1; i++) {
                            const p1 = r.path[i], p2 = r.path[i+1];
                            if (!p1 || !p2 || isNaN(p1[0]) || isNaN(p2[0])) continue;
                            const dist = Math.hypot(p2[0]-p1[0], p2[1]-p1[1]);
                            const steps = Math.max(1, Math.ceil(dist / interpolateStep));
                            for (let j = 0; j <= steps; j++) {
                                const t = j / steps; const currNode = createNode(p1[0] + (p2[0] - p1[0]) * t, p1[1] + (p2[1] - p1[1]) * t);
                                if (prevNode) addEdge(prevNode, currNode); prevNode = currNode;
                            }
                        }
                    });
                };
                processPaths(this.data.highways); processPaths(this.data.bridges); processPaths(this.data.tunnels);

                for (const node of this.data.nodes) {
                    const gx = Math.floor(node.x / cellSize), gy = Math.floor(node.y / cellSize);
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            const neighborCells = spatialGrid.get(`${gx + dx},${gy + dy}`);
                            if (neighborCells) {
                                for (const otherNode of neighborCells) {
                                    if (node.id !== otherNode.id && Math.hypot(otherNode.x - node.x, otherNode.y - node.y) <= maxConnectionDist) addEdge(node, otherNode);
                                }
                            }
                        }
                    }
                }
            }
        }

        // --- 3. SATELLITE MAP ENGINE ---
        class MapEngine {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d', { alpha: false, antialias: false });
                this.container = this.canvas.parentElement;
                
                this.data = null;
                this.assets = { terrain: new Image(), topo: new Image() };
                this.assets.terrain.src = 'https://harmony.yaga.host/harmony-terrain.png';
                this.assets.topo.src = 'https://harmony.yaga.host/harmony-topo.png';
                this.assets.terrain.onload = () => this.scheduleRender();
                this.assets.topo.onload = () => this.scheduleRender();

                this.config = { mode: 'ping', shader: 'terrain', layers: { deedsActive: true, deedsFallen: true, highways: true, bridges: true, tunnels: true, specials: false, grid: true } };
                this.camera = { x: -1000, y: -1000, scale: 0.5 };
                this.isDragging = false; this.dragStart = { x: 0, y: 0 };
                
                this.targetPing = null; // Animação temporária
                this.persistentPing = null; // Cruz Azul persistente
                
                this.routePoints = []; 
                this.smartRoutePath = [];

                this.initEvents();
                new ResizeObserver(() => this.resize()).observe(this.container);
            }

            initEvents() {
                let isPinching = false, pinchInitialDist = 0, pinchInitialScale = 1, touchMoved = false, clickStartPos = { x: 0, y: 0 };

                this.canvas.addEventListener('mousedown', e => {
                    this.isDragging = true; clickStartPos = { x: e.clientX, y: e.clientY };
                    this.dragStart = { x: e.clientX - this.camera.x, y: e.clientY - this.camera.y };
                });
                window.addEventListener('mouseup', () => this.isDragging = false);
                this.canvas.addEventListener('mousemove', e => {
                    const rect = this.container.getBoundingClientRect();
                    const gx = Math.round((e.clientX - rect.left - this.camera.x) / this.camera.scale);
                    const gy = Math.round((e.clientY - rect.top - this.camera.y) / this.camera.scale);
                    document.getElementById('hud-mouse').textContent = `X:${gx} Y:${gy}`;
                    if (this.isDragging) { this.camera.x = e.clientX - this.dragStart.x; this.camera.y = e.clientY - this.dragStart.y; this.scheduleRender(); }
                });

                this.canvas.addEventListener('wheel', e => {
                    e.preventDefault();
                    const rect = this.container.getBoundingClientRect();
                    const zFactor = Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1);
                    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                    const tx = (mx - this.camera.x) / this.camera.scale, ty = (my - this.camera.y) / this.camera.scale;

                    this.camera.scale = Math.max(0.05, Math.min(this.camera.scale * zFactor, 8));
                    this.camera.x = mx - (tx * this.camera.scale); this.camera.y = my - (ty * this.camera.scale);
                    document.getElementById('hud-scale').textContent = `${this.camera.scale.toFixed(1)}x`; this.scheduleRender();
                }, { passive: false });

                this.canvas.addEventListener('touchstart', e => {
                    touchMoved = false;
                    if (e.touches.length === 1) {
                        this.isDragging = true; clickStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        this.dragStart = { x: e.touches[0].clientX - this.camera.x, y: e.touches[0].clientY - this.camera.y };
                    } else if (e.touches.length === 2) {
                        isPinching = true; pinchInitialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        pinchInitialScale = this.camera.scale;
                    }
                }, { passive: false });
                
                this.canvas.addEventListener('touchmove', e => {
                    e.preventDefault(); touchMoved = true;
                    if (isPinching && e.touches.length === 2) {
                        const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        const newScale = Math.max(0.05, Math.min(pinchInitialScale * (currentDist / pinchInitialDist), 8));
                        const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2, my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const rect = this.container.getBoundingClientRect();
                        const tx = (mx - rect.left - this.camera.x) / this.camera.scale, ty = (my - rect.top - this.camera.y) / this.camera.scale;
                        this.camera.scale = newScale;
                        this.camera.x = mx - rect.left - (tx * this.camera.scale); this.camera.y = my - rect.top - (ty * this.camera.scale);
                        document.getElementById('hud-scale').textContent = `${this.camera.scale.toFixed(1)}x`; this.scheduleRender();
                    } else if (this.isDragging && e.touches.length === 1) {
                        this.camera.x = e.touches[0].clientX - this.dragStart.x; this.camera.y = e.touches[0].clientY - this.dragStart.y; this.scheduleRender();
                    }
                }, { passive: false });
                this.canvas.addEventListener('touchend', e => { if (e.touches.length < 2) isPinching = false; if (e.touches.length === 0) this.isDragging = false; });

                this.canvas.addEventListener('click', e => {
                    if (touchMoved || Math.abs(e.clientX - clickStartPos.x) > 5 || Math.abs(e.clientY - clickStartPos.y) > 5) return;
                    const rect = this.container.getBoundingClientRect();
                    const x = Math.round((e.clientX - rect.left - this.camera.x) / this.camera.scale);
                    const y = Math.round((e.clientY - rect.top - this.camera.y) / this.camera.scale);
                    
                    if (this.config.mode === 'ping') {
                        this.focusCamera(x, y, false, false);
                    } else if (this.config.mode.startsWith('route')) {
                        this.addRoutePoint(x, y, `${x},${y}`);
                    }
                });
            }

            resize() {
                const rect = this.container.getBoundingClientRect();
                if(rect.width === 0 || rect.height === 0) return; 
                this.canvas.width = rect.width; this.canvas.height = rect.height;
                this.ctx.imageSmoothingEnabled = false; this.scheduleRender();
            }

            loadData(data) {
                this.data = data;
                this.camera.x = Math.floor((this.canvas.width / 2) - (2000 * this.camera.scale));
                this.camera.y = Math.floor((this.canvas.height / 2) - (2000 * this.camera.scale));
                this.scheduleRender();
            }

            focusCamera(x, y, changeScale = true, panCamera = true) {
                if (changeScale) { this.camera.scale = 1.5; document.getElementById('hud-scale').textContent = '1.5x'; }
                if (panCamera) {
                    this.camera.x = Math.floor((this.canvas.width / 2) - (x * this.camera.scale));
                    this.camera.y = Math.floor((this.canvas.height / 2) - (y * this.camera.scale));
                }
                
                this.targetPing = { x, y, radius: 0 };
                this.persistentPing = { x, y }; // Define o marcador fixo (Cruz Azul)
                
                document.getElementById('hud-selected').value = `X:${x}, Y:${y}`;
                window.history.replaceState(null, '', `${window.location.pathname}?x=${x}&y=${y}`);
                this.animatePing();
            }

            // ==========================================
            // OTIMIZADOR DE ROTA (Nearest Neighbor TSP)
            // ==========================================
            optimizeRouteOrder() {
                if (this.routePoints.length <= 2) return; 
                
                const optimized = [this.routePoints[0]]; // Ponto A fixo
                let unvisited = this.routePoints.slice(1);
                
                let current = optimized[0];
                while (unvisited.length > 0) {
                    let nearestIdx = 0;
                    let minDist = Infinity;
                    
                    for (let i = 0; i < unvisited.length; i++) {
                        const dist = Math.hypot(unvisited[i].x - current.x, unvisited[i].y - current.y);
                        if (dist < minDist) { minDist = dist; nearestIdx = i; }
                    }
                    
                    current = unvisited.splice(nearestIdx, 1)[0];
                    optimized.push(current);
                }
                this.routePoints = optimized;
            }

            addRoutePoint(x, y, name) {
                this.routePoints.push({ x, y, name: name || `${x},${y}` });
                this.optimizeRouteOrder();
                this.syncRouteUI();
                this.calculateRoute();
                this.scheduleRender();
            }

            removeRoutePoint(index) {
                this.routePoints.splice(index, 1);
                this.optimizeRouteOrder();
                this.syncRouteUI();
                this.calculateRoute();
                this.scheduleRender();
            }

            syncRouteUI() {
                const container = document.getElementById('route-list-ui');
                container.innerHTML = '';
                this.routePoints.forEach((pt, i) => {
                    const el = document.createElement('div');
                    el.className = "flex justify-between items-center bg-black/50 border border-gray-800 p-2 rounded";
                    el.innerHTML = `
                        <span class="text-xs text-gray-200 font-mono truncate"><strong class="text-[${i===0?'#00f3ff':'#ffaa00'}] mr-2">${String.fromCharCode(65+i)}:</strong> ${pt.name}</span>
                        <button class="text-red-500 hover:text-red-400 px-2 text-sm font-bold" onclick="window.removeRP(${i})">×</button>
                    `;
                    container.appendChild(el);
                });
                document.getElementById('btn-clear-route').className = this.routePoints.length > 0 ? "w-full mt-2 py-1 bg-transparent text-gray-400 text-xs font-mono border border-gray-700 hover:text-white hover:border-gray-500 transition" : "hidden";
            }

            getNearestGraphNode(x, y) {
                if (!this.data || !this.data.nodes || this.data.nodes.length === 0) return null;
                let nearest = null, minDist = Infinity;
                for (let i = 0; i < this.data.nodes.length; i++) {
                    const node = this.data.nodes[i];
                    const dist = Math.hypot(node.x - x, node.y - y);
                    if (dist < minDist) { minDist = dist; nearest = { id: node.id, x: node.x, y: node.y, dist }; }
                }
                return nearest;
            }

            runAStar(nodeA, nodeB) {
                const distances = new Map(), previous = new Map(), visited = new Set(), pq = new MinHeap();
                distances.set(nodeA.id, 0); pq.push(nodeA.id, 0);
                let pathFound = false;

                while(!pq.isEmpty()) {
                    const currentId = pq.pop().val;
                    if (currentId === nodeB.id) { pathFound = true; break; }
                    if (visited.has(currentId)) continue;
                    visited.add(currentId);

                    for(let edge of (this.data.graph.get(currentId) || [])) {
                        if (visited.has(edge.target)) continue;
                        const alt = distances.get(currentId) + edge.weight;
                        if(alt < (distances.get(edge.target) || Infinity)) {
                            distances.set(edge.target, alt); previous.set(edge.target, currentId);
                            const tNode = this.data.nodes[edge.target];
                            pq.push(edge.target, alt + Math.hypot(tNode.x - nodeB.x, tNode.y - nodeB.y));
                        }
                    }
                }
                
                const path = [];
                if (pathFound || nodeA.id === nodeB.id) {
                    let currId = nodeB.id;
                    while(currId !== undefined && currId !== null) {
                        path.unshift({x: this.data.nodes[currId].x, y: this.data.nodes[currId].y});
                        currId = previous.get(currId);
                    }
                }
                return { path, dist: distances.get(nodeB.id) || 0 };
            }

            calculateRoute() {
                const output = document.getElementById('route-output');
                if (this.routePoints.length < 2) {
                    output.innerHTML = 'Adicione ao menos 2 pontos na rota.';
                    this.smartRoutePath = [];
                    return;
                }

                let totalDistanceTiles = 0;
                let anyFail = false;
                this.smartRoutePath = []; 

                for (let i = 0; i < this.routePoints.length - 1; i++) {
                    const p1 = this.routePoints[i], p2 = this.routePoints[i+1];

                    if (this.config.mode === 'route-straight') {
                        totalDistanceTiles += Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    } else if (this.config.mode === 'route-smart') {
                        const nA = this.getNearestGraphNode(p1.x, p1.y), nB = this.getNearestGraphNode(p2.x, p2.y);
                        if (!nA || !nB) { anyFail = true; totalDistanceTiles += Math.hypot(p2.x - p1.x, p2.y - p1.y); continue; }
                        
                        const result = this.runAStar(nA, nB);
                        if (result.path.length > 0) {
                            this.smartRoutePath.push({ start: p1, end: p2, path: result.path });
                            totalDistanceTiles += nA.dist + result.dist + nB.dist;
                        } else {
                            anyFail = true; totalDistanceTiles += Math.hypot(p2.x - p1.x, p2.y - p1.y);
                        }
                    }
                }

                totalDistanceTiles = Math.round(totalDistanceTiles);
                const distanceKm = (totalDistanceTiles * 4) / 1000; 
                const speedKmh = parseFloat(document.getElementById('route-speed').value) || 30;
                const totalMinutes = Math.round((distanceKm / speedKmh) * 60);
                const timeStr = Math.floor(totalMinutes / 60) > 0 ? `${Math.floor(totalMinutes/60)}h ${totalMinutes%60}m` : `${totalMinutes} min`;

                if (this.config.mode === 'route-smart' && anyFail) {
                    output.innerHTML = `<span class="text-red-400 font-bold">Sem Conexão Viária em Trechos</span><br><span class="text-gray-400">Distância Direta: ${distanceKm.toFixed(2)} km</span>`;
                } else {
                    output.innerHTML = `<span class="text-[#00f3ff]">${totalDistanceTiles} tiles</span> | <span class="text-[#ffaa00]">${distanceKm.toFixed(2)} km</span><br>ETA: <span class="text-white">${timeStr}</span>`;
                }
            }

            clearRoute() {
                this.routePoints = []; this.smartRoutePath = [];
                this.syncRouteUI(); this.calculateRoute(); this.scheduleRender();
            }

            animatePing() {
                if(this.pingAnim) cancelAnimationFrame(this.pingAnim);
                const step = () => {
                    if (!this.targetPing) return;
                    this.targetPing.radius += 3;
                    this.scheduleRender();
                    if (this.targetPing.radius < 120) { this.pingAnim = requestAnimationFrame(step); } 
                    else { this.targetPing = null; this.scheduleRender(); }
                };
                step();
            }

            updateConfig(type, key, value) {
                if (type === 'layer') this.config.layers[key] = value; else this.config[key] = value;
                this.scheduleRender();
            }

            scheduleRender() {
                if (this.pending) return; this.pending = true; requestAnimationFrame(() => this.render());
            }

            drawAlphanumericGrid(ctx, mapSize) {
                const gridSize = 200; 
                ctx.beginPath(); ctx.strokeStyle = this.config.shader === 'topo' ? 'rgba(0, 150, 255, 0.4)' : 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1 / this.camera.scale;
                for (let i = 0; i <= mapSize; i += gridSize) { ctx.moveTo(i, 0); ctx.lineTo(i, mapSize); ctx.moveTo(0, i); ctx.lineTo(mapSize, i); }
                ctx.stroke();

                if (this.camera.scale > 0.4) {
                    ctx.fillStyle = this.config.shader === 'topo' ? 'rgba(0, 243, 255, 0.7)' : 'rgba(255, 255, 255, 0.4)';
                    ctx.font = `bold ${Math.max(12, 18 / this.camera.scale)}px 'JetBrains Mono'`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    const getLetter = (num) => { let l = ''; while(num>0){ let m=(num-1)%26; l=String.fromCharCode(65+m)+l; num=Math.floor((num-m)/26); } return l; };
                    
                    const sX = Math.max(0, Math.floor(-this.camera.x / this.camera.scale)), sY = Math.max(0, Math.floor(-this.camera.y / this.camera.scale));
                    const eX = Math.min(mapSize, sX + (this.canvas.width / this.camera.scale)), eY = Math.min(mapSize, sY + (this.canvas.height / this.camera.scale));

                    for (let x = Math.floor(sX/gridSize)*gridSize; x <= eX; x += gridSize) {
                        for (let y = Math.floor(sY/gridSize)*gridSize; y <= eY; y += gridSize) {
                            ctx.fillText(`${getLetter(Math.floor(y / gridSize) + 2)}${Math.floor(x / gridSize) + 7}`, x + (gridSize/2), y + (gridSize/2));
                        }
                    }
                    ctx.textAlign = 'left';
                }
            }

            // Função Helper para setas de direção
            drawDirectionArrow(ctx, x, y, angle, color) {
                const size = 12 / this.camera.scale;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-size, size / 1.5);
                ctx.lineTo(-size, -size / 1.5);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
                ctx.restore();
            }

            render() {
                this.pending = false; const ctx = this.ctx;
                ctx.imageSmoothingEnabled = false; ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                ctx.save(); ctx.translate(Math.round(this.camera.x), Math.round(this.camera.y)); ctx.scale(this.camera.scale, this.camera.scale);

                const imgToDraw = this.config.shader === 'terrain' ? this.assets.terrain : this.assets.topo;
                let mapSize = 6000; 
                if (imgToDraw.complete && imgToDraw.naturalWidth > 0) { ctx.drawImage(imgToDraw, 0, 0); mapSize = imgToDraw.naturalWidth; } 
                else { ctx.fillStyle = this.config.shader === 'terrain' ? '#0a1f0f' : '#051224'; ctx.fillRect(0, 0, mapSize, mapSize); }

                if (this.config.layers.grid) this.drawAlphanumericGrid(ctx, mapSize);

                const drawSimplePath = (paths, color, w, dashed = false) => {
                    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = w / this.camera.scale;
                    if(dashed) ctx.setLineDash([6 / this.camera.scale, 6 / this.camera.scale]);
                    paths.forEach(p => { ctx.moveTo(p.path[0][0], p.path[0][1]); for(let j=1; j<p.path.length; j++) ctx.lineTo(p.path[j][0], p.path[j][1]); });
                    ctx.stroke(); ctx.setLineDash([]);
                };

                if (this.config.layers.tunnels && this.data) drawSimplePath(this.data.tunnels, 'rgba(150,150,150,0.9)', 3, true);
                if (this.config.layers.highways && this.data) drawSimplePath(this.data.highways, 'rgba(100,200,255,0.8)', 3);
                if (this.config.layers.bridges && this.data) drawSimplePath(this.data.bridges, 'rgba(255,120,50,1)', 6);

                // ==============================
                // RENDERIZAR MULTI-ROTAS + SETAS
                // ==============================
                if (this.routePoints.length >= 2) {
                    const routeColor = this.config.mode === 'route-smart' ? '#ffaa00' : '#bf00ff';
                    
                    if (this.config.mode === 'route-straight' || (this.config.mode === 'route-smart' && this.smartRoutePath.length === 0)) {
                        ctx.beginPath();
                        ctx.strokeStyle = routeColor;
                        ctx.lineWidth = 5 / this.camera.scale;
                        ctx.setLineDash([15 / this.camera.scale, 10 / this.camera.scale]);
                        ctx.moveTo(this.routePoints[0].x, this.routePoints[0].y);
                        for (let i = 1; i < this.routePoints.length; i++) {
                            ctx.lineTo(this.routePoints[i].x, this.routePoints[i].y);
                        }
                        ctx.stroke(); ctx.setLineDash([]);
                        
                        // Setas para Linha Reta
                        for (let i = 0; i < this.routePoints.length - 1; i++) {
                            const p1 = this.routePoints[i], p2 = this.routePoints[i+1];
                            const midX = (p1.x + p2.x) / 2, midY = (p1.y + p2.y) / 2;
                            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                            this.drawDirectionArrow(ctx, midX, midY, angle, '#fff');
                        }

                    } else if (this.config.mode === 'route-smart') {
                        this.smartRoutePath.forEach(segment => {
                            // Linhas Pontilhadas de aproximação
                            ctx.beginPath(); ctx.strokeStyle = routeColor; ctx.lineWidth = 3 / this.camera.scale; ctx.setLineDash([8 / this.camera.scale, 8 / this.camera.scale]); 
                            ctx.moveTo(segment.start.x, segment.start.y); ctx.lineTo(segment.path[0].x, segment.path[0].y); ctx.stroke();
                            
                            // Caminho Principal
                            ctx.beginPath(); ctx.lineWidth = 6 / this.camera.scale; ctx.setLineDash([]); 
                            ctx.moveTo(segment.path[0].x, segment.path[0].y);
                            segment.path.forEach(pt => ctx.lineTo(pt.x, pt.y)); ctx.stroke();
                            
                            // Linha Pontilhada de Saída
                            ctx.beginPath(); ctx.lineWidth = 3 / this.camera.scale; ctx.setLineDash([8 / this.camera.scale, 8 / this.camera.scale]); 
                            ctx.moveTo(segment.path[segment.path.length - 1].x, segment.path[segment.path.length - 1].y); ctx.lineTo(segment.end.x, segment.end.y); ctx.stroke();
                            
                            // Seta para Rota Inteligente (Acha o meio do segmento path)
                            if (segment.path.length >= 2) {
                                const midIndex = Math.floor(segment.path.length / 2);
                                const p1 = segment.path[Math.max(0, midIndex - 1)];
                                const p2 = segment.path[Math.min(segment.path.length - 1, midIndex + 1)];
                                const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                                this.drawDirectionArrow(ctx, segment.path[midIndex].x, segment.path[midIndex].y, angle, '#fff');
                            }
                        });
                        ctx.setLineDash([]);
                    }
                }

                if (this.routePoints.length > 0) {
                    this.routePoints.forEach((p, index) => {
                        ctx.beginPath(); ctx.arc(p.x, p.y, 6 / this.camera.scale, 0, 6.28);
                        ctx.fillStyle = index === 0 ? '#00f3ff' : (this.config.mode === 'route-smart' ? '#ffaa00' : '#bf00ff'); ctx.fill();
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 / this.camera.scale; ctx.stroke();
                        this.drawText(ctx, String.fromCharCode(65+index), p.x, p.y - (12/this.camera.scale), '#fff', Math.max(14, 18/this.camera.scale), true);
                    });
                }

                if (this.config.layers.specials && this.data) {
                    this.data.specials.forEach(s => {
                        ctx.fillStyle = '#ffaa00'; ctx.beginPath();
                        ctx.moveTo(s.x, s.y - (5/this.camera.scale)); ctx.lineTo(s.x + (5/this.camera.scale), s.y + (5/this.camera.scale)); ctx.lineTo(s.x - (5/this.camera.scale), s.y + (5/this.camera.scale)); ctx.fill();
                        this.drawText(ctx, s.name, s.x, s.y + (12/this.camera.scale), '#ffaa00', Math.max(12, 16 / this.camera.scale), true);
                    });
                }

                if (this.data && (this.config.layers.deedsActive || this.config.layers.deedsFallen)) {
                    const r = 4 / this.camera.scale, fS = Math.max(12, 16 / this.camera.scale);
                    this.data.deeds.forEach(d => {
                        if ((!d.isHidden && this.config.layers.deedsActive) || (d.isHidden && this.config.layers.deedsFallen)) {
                            ctx.fillStyle = d.isHidden ? '#ff003c' : '#00ff66';
                            ctx.beginPath(); ctx.arc(Math.round(d.x), Math.round(d.y), r, 0, 6.28); ctx.fill();
                            this.drawText(ctx, d.name, d.x, d.y, 'rgba(255,255,255,1)', fS);
                        }
                    });
                }

                // Cruz Azul Persistente
                if (this.persistentPing) {
                    const size = 15 / this.camera.scale;
                    ctx.beginPath();
                    ctx.strokeStyle = '#00f3ff';
                    ctx.lineWidth = 3 / this.camera.scale;
                    ctx.moveTo(this.persistentPing.x - size, this.persistentPing.y);
                    ctx.lineTo(this.persistentPing.x + size, this.persistentPing.y);
                    ctx.moveTo(this.persistentPing.x, this.persistentPing.y - size);
                    ctx.lineTo(this.persistentPing.x, this.persistentPing.y + size);
                    ctx.stroke();
                }

                // Animação de Onda do Ping
                if (this.targetPing) {
                    ctx.beginPath(); ctx.arc(this.targetPing.x, this.targetPing.y, this.targetPing.radius / this.camera.scale, 0, 6.28);
                    ctx.strokeStyle = `rgba(0, 243, 255, ${1 - (this.targetPing.radius/120)})`; ctx.lineWidth = 3 / this.camera.scale; ctx.stroke();
                }

                ctx.restore();
            }

            drawText(ctx, text, x, y, color, fontSize, isCenter = false) {
                if (this.camera.scale > 0.4) {
                    ctx.fillStyle = color; ctx.font = `bold ${Math.round(fontSize)}px 'Rajdhani'`;
                    ctx.strokeStyle = 'black'; ctx.lineWidth = 3 / this.camera.scale;
                    ctx.textAlign = isCenter ? 'center' : 'left';
                    const dX = Math.round(x + (isCenter ? 0 : 8/this.camera.scale)), dY = Math.round(y + (isCenter ? 0 : 4/this.camera.scale));
                    ctx.strokeText(text, dX, dY); ctx.fillText(text, dX, dY); ctx.textAlign = 'left';
                }
            }
        }

        // --- 4. SYSTEM AUTO-BOOT ---
        document.addEventListener('DOMContentLoaded', () => {
            const dataLink = new DataLink();
            const mapEngine = new MapEngine('tactical-canvas');
            
            window.removeRP = (i) => mapEngine.removeRoutePoint(i);

            const sidebar = document.getElementById('sidebar');
            document.getElementById('mobile-menu-btn').addEventListener('click', () => sidebar.classList.remove('-translate-x-full'));
            document.getElementById('close-sidebar-btn').addEventListener('click', () => sidebar.classList.add('-translate-x-full'));

            const attachAutocomplete = (inputId, onSelect) => {
                const input = document.getElementById(inputId);
                const wrapper = input.parentElement;
                const dropdown = document.createElement('div');
                dropdown.className = "absolute z-50 w-full top-full mt-1 bg-black/95 backdrop-blur border border-[#00f3ff]/40 shadow-[0_0_15px_rgba(0,0,0,0.9)] max-h-48 overflow-y-auto hidden text-[11px] font-mono dropdown-scroll";
                wrapper.appendChild(dropdown);

                const renderList = (matches) => {
                    dropdown.innerHTML = '';
                    if (matches.length === 0) { dropdown.classList.add('hidden'); return; }
                    matches.forEach(loc => {
                        const item = document.createElement('div');
                        item.className = "px-2 py-2 cursor-pointer hover:bg-[#00f3ff]/20 hover:text-white text-gray-300 border-b border-gray-800 last:border-0 flex justify-between items-center transition-colors";
                        const color = loc.type === 'deed' ? (loc.isHidden ? 'text-[#ff003c]' : 'text-[#00ff66]') : 'text-[#ffaa00]';
                        item.innerHTML = `<span class="${color} truncate font-bold mr-2 text-[12px]">${loc.name}</span><span class="text-gray-500 bg-gray-900 px-1 rounded shrink-0">${loc.x},${loc.y}</span>`;
                        item.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            input.value = ''; 
                            dropdown.classList.add('hidden');
                            if (onSelect) onSelect(loc);
                        });
                        dropdown.appendChild(item);
                    });
                    dropdown.classList.remove('hidden');
                };

                const filterData = () => {
                    const val = input.value.toLowerCase().trim();
                    const allLocs = [...dataLink.data.deeds.map(d=>({...d, type:'deed'})), ...dataLink.data.specials.map(s=>({...s, type:'special'}))];
                    
                    if (!val) { renderList(allLocs.slice(0, 50)); return; }

                    const gridPos = parseGridToCoords(val);
                    const matches = allLocs.filter(loc => loc.name.toLowerCase().includes(val) || `${loc.x},${loc.y}`.includes(val)).slice(0, 30);
                    
                    if (gridPos) matches.unshift({ ...gridPos, type: 'special' }); 
                    renderList(matches);
                };

                input.addEventListener('input', filterData);
                input.addEventListener('focus', filterData);
                input.addEventListener('blur', () => dropdown.classList.add('hidden'));
            };

            const bootSystem = async () => {
                try {
                    await dataLink.fetchDynamicData();
                    mapEngine.loadData(dataLink.data);
                    
                    attachAutocomplete('search-input', (loc) => {
                        mapEngine.focusCamera(loc.x, loc.y, true, true);
                        if (window.innerWidth < 768) sidebar.classList.add('-translate-x-full');
                    });

                    attachAutocomplete('route-add-input', (loc) => {
                        mapEngine.addRoutePoint(loc.x, loc.y, loc.name);
                    });
                    
                    document.getElementById('status-indicator').innerHTML = '<span class="text-[#00ff66]">✓ Link Dinâmico Ativo</span>';
                    document.getElementById('status-indicator').className = "w-full py-2 bg-transparent border border-[#00ff66] text-[#00ff66] font-mono text-sm flex items-center justify-center gap-2";
                    document.getElementById('controls-module').classList.remove('opacity-50', 'pointer-events-none');

                    // Check params post boot to show the persistent marker
                    const params = new URLSearchParams(window.location.search);
                    if (params.has('x') && params.has('y')) {
                        mapEngine.focusCamera(parseInt(params.get('x')), parseInt(params.get('y')), true, true);
                    }

                } catch (err) { logger.log(`ERRO: ${err.message}`, 'error'); }
            };

            bootSystem();

            document.querySelectorAll('input[name="interaction-mode"]').forEach(el => el.addEventListener('change', e => {
                const mode = e.target.value; mapEngine.updateConfig('root', 'mode', mode);
                const panel = document.getElementById('route-panel');
                if (mode === 'ping') { mapEngine.clearRoute(); panel.className = "bg-black/40 p-3 rounded border border-gray-800 flex flex-col"; } 
                else if (mode === 'route-straight') { panel.className = "bg-black/40 p-3 rounded border border-[#bf00ff]/50 shadow-[0_0_10px_rgba(191,0,255,0.1)] flex flex-col"; if(mapEngine.routePoints.length >= 2) mapEngine.calculateRoute(); } 
                else if (mode === 'route-smart') { panel.className = "bg-black/40 p-3 rounded border border-[#ffaa00]/50 shadow-[0_0_10px_rgba(255,170,0,0.1)] flex flex-col"; if(mapEngine.routePoints.length >= 2) mapEngine.calculateRoute(); }
                mapEngine.scheduleRender();
            }));

            document.querySelectorAll('input[name="map-type"]').forEach(el => el.addEventListener('change', e => mapEngine.updateConfig('root', 'shader', e.target.value)));
            document.getElementById('btn-clear-route').addEventListener('click', () => mapEngine.clearRoute());
            document.getElementById('route-speed').addEventListener('input', () => { if (mapEngine.routePoints.length >= 2) mapEngine.calculateRoute(); });
            
            document.getElementById('btn-focus').addEventListener('click', () => {
                const input = document.getElementById('search-input').value;
                const gridPos = parseGridToCoords(input);
                if (gridPos) {
                    mapEngine.focusCamera(gridPos.x, gridPos.y, true, true);
                    if (window.innerWidth < 768) sidebar.classList.add('-translate-x-full');
                }
            });

            document.getElementById('btn-add-route').addEventListener('click', () => {
                const input = document.getElementById('route-add-input');
                const gridPos = parseGridToCoords(input.value);
                if (gridPos) {
                    mapEngine.addRoutePoint(gridPos.x, gridPos.y, gridPos.name);
                    input.value = '';
                }
            });

            document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btn-focus').click(); });
            document.getElementById('route-add-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btn-add-route').click(); });

            ['l-deeds-active', 'l-deeds-fallen', 'l-highways', 'l-bridges', 'l-tunnels', 'l-specials', 'l-grid'].forEach(id => {
                document.getElementById(id).addEventListener('change', e => mapEngine.updateConfig('layer', id.replace('l-','').replace(/-([a-z])/g, g => g[1].toUpperCase()), e.target.checked));
            });
        });
    </script>
</body>
